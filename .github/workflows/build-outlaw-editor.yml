name: Build OutlawEditor

on:
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Read version from pom.xml
        id: get_version
        working-directory: OutlawEditor
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: version
    strategy:
      matrix:
        include:
          - os: macos-15
            label: macOS-arm64
          - os: windows-latest
            label: win64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        working-directory: OutlawEditor
        run: mvn -B clean package -DskipTests

      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: OutlawEditor
        run: |
          VERSION=${{ needs.version.outputs.app_version }}
          jpackage \
            --type dmg \
            --name OutlawEditor \
            --app-version "$VERSION" \
            --vendor "The 8-Bit Bunch" \
            --module-path "target/OutlawEditor.jar:target/lib" \
            --module outlaweditor/org.badvision.outlaweditor.Application \
            --java-options '--add-exports javafx.controls/com.sun.javafx.scene.control.behavior=org.controlsfx.controls' \
            --java-options '--add-exports javafx.base/com.sun.javafx.event=org.controlsfx.controls' \
            --dest dist
          mv dist/OutlawEditor-${VERSION}.dmg dist/OutlawEditor-macOS-arm64.dmg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: OutlawEditor
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.app_version }}"
          $libJars = (Get-ChildItem target\lib -Filter *.jar | ForEach-Object { $_.FullName }) -join ";"
          $modulePath = "target\OutlawEditor.jar;$libJars"
          jpackage `
            --type app-image `
            --name OutlawEditor `
            --app-version "$version" `
            --vendor "The 8-Bit Bunch" `
            --module-path "$modulePath" `
            --module outlaweditor/org.badvision.outlaweditor.Application `
            --java-options '--add-exports javafx.controls/com.sun.javafx.scene.control.behavior=org.controlsfx.controls' `
            --java-options '--add-exports javafx.base/com.sun.javafx.event=org.controlsfx.controls' `
            --dest dist
          Compress-Archive -Path dist\OutlawEditor -DestinationPath dist\OutlawEditor-win64.zip

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: OutlawEditor-${{ matrix.label }}
          path: OutlawEditor/dist/OutlawEditor-macOS-arm64.dmg

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: OutlawEditor-${{ matrix.label }}
          path: OutlawEditor/dist/OutlawEditor-win64.zip

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: OutlawEditor-${{ needs.version.outputs.app_version }}
          name: OutlawEditor ${{ needs.version.outputs.app_version }}
          body: OutlawEditor ${{ needs.version.outputs.app_version }} — macOS (Apple Silicon) and Windows builds.
          make_latest: true
          files: |
            artifacts/OutlawEditor-macOS-arm64/OutlawEditor-macOS-arm64.dmg
            artifacts/OutlawEditor-win64/OutlawEditor-win64.zip
